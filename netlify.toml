[build]
  command = "npm run build"
  publish = "dist"
  # Optimize compute credits: Only trigger a build if frontend or backend code files change.
  # Skips builds for docs, tests, local cache, vercel config, or scratch files.
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF src/ public/ package.json index.html vite.config.ts netlify.toml server.ts server/ netlify/functions/"

[build.environment]
  # Speed up builds by preventing strict CI checks from treating warnings as errors
  CI = "false"
  # Specify Node version to avoid installation overhead
  NODE_VERSION = "20"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/scan/*"
  to = "/.netlify/functions/api/scan/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
